<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Performance Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-3xl font-bold text-emerald-400 tracking-wide">Performance Observability Lab</h1>
            <p class="text-gray-400 mt-1">Context-Aware Enterprise Automation Suite</p>
        </header>

        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-lg mb-8">
            <h2 class="text-lg font-semibold mb-4 text-gray-200 uppercase tracking-wider">Test Configuration</h2>
            <form id="configForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Application Package ID</label>
                    <input type="text" id="packageName" required placeholder="e.g. in.playsimple.escapearrow" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2.5 text-gray-100 focus:outline-none focus:border-emerald-500 font-mono">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Upload Profile APK File</label>
                    <input type="file" id="apkFile" required accept=".apk" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-1.5 text-sm text-gray-300 file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-emerald-600 file:text-white hover:file:bg-emerald-700 cursor-pointer">
                </div>
                <div class="col-span-2 flex gap-3">
                    <button type="button" id="startBtn" onclick="triggerStart()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-3 rounded-lg transition duration-200">Launch & Record</button>
                    <button type="button" id="stopBtn" onclick="triggerStop()" disabled class="flex-1 bg-rose-600 hover:bg-rose-700 disabled:bg-gray-700 text-white font-bold py-2.5 px-3 rounded-lg transition duration-200 cursor-not-allowed">Stop</button>
                    <button type="button" id="exportBtn" onclick="triggerExcelDownload()" disabled class="flex-1 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-700 text-white font-bold py-2.5 px-3 rounded-lg transition duration-200 cursor-not-allowed">Excel RCA</button>
                    <button type="button" id="exportMdBtn" onclick="triggerMdDownload()" disabled class="flex-1 bg-purple-600 hover:bg-purple-700 disabled:bg-gray-700 text-white font-bold py-2.5 px-3 rounded-lg transition duration-200 cursor-not-allowed">MD Audit</button>
                </div>
            </form>
            <p id="statusFeedback" class="text-sm mt-4 text-gray-400 hidden font-medium"></p>
        </div>

        <div id="metricsMatrix" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8 opacity-40 transition-opacity duration-300">
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-lg"><p class="text-sm font-semibold uppercase tracking-wider text-gray-400">System Health Score</p><p id="health-score" class="text-4xl font-extrabold mt-2 text-emerald-400">--</p></div>
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-lg"><p class="text-sm font-semibold uppercase tracking-wider text-gray-400">Overall Jank Ratio</p><p id="jank-percentage" class="text-4xl font-extrabold mt-2 text-amber-400">--</p></div>
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-lg"><p class="text-sm font-semibold uppercase tracking-wider text-gray-400">Avg UI Thread Time</p><p id="avg-ui" class="text-4xl font-extrabold mt-2 text-blue-400">--</p></div>
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-lg"><p class="text-sm font-semibold uppercase tracking-wider text-gray-400">Avg Raster Thread Time</p><p id="avg-raster" class="text-4xl font-extrabold mt-2 text-purple-400">--</p></div>
        </div>

        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-lg mb-8">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-md font-semibold text-gray-300 uppercase tracking-wider">Frame Rendering Latency & Event Diagnostics</h3>
                <div class="flex gap-1 bg-gray-900 rounded-lg p-1">
                    <button id="frameLineBtn" onclick="switchFrameChartType('line')" class="px-3 py-1 text-xs font-semibold rounded-md bg-emerald-600 text-white transition">Line</button>
                    <button id="frameBarBtn" onclick="switchFrameChartType('bar')" class="px-3 py-1 text-xs font-semibold rounded-md text-gray-400 hover:text-white transition">Bar</button>
                </div>
            </div>
            <div class="relative">
                <div id="frameScrollWrapper" class="w-full overflow-x-auto overflow-y-hidden custom-scrollbar pb-3">
                    <div id="frameChartContainer" class="relative h-[320px]" style="min-width: 100%;">
                        <canvas id="telemetryChart"></canvas>
                    </div>
                </div>
                <canvas id="telemetryChartYAxis" class="absolute top-0 left-0 pointer-events-none z-10" style="display:none;"></canvas>
            </div>
        </div>

        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-lg mb-8">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-md font-semibold text-gray-300 uppercase tracking-wider">Hardware Power & Thermals Tracking</h3>
                <div class="flex gap-1 bg-gray-900 rounded-lg p-1">
                    <button id="batteryLineBtn" onclick="switchBatteryChartType('line')" class="px-3 py-1 text-xs font-semibold rounded-md bg-emerald-600 text-white transition">Line</button>
                    <button id="batteryBarBtn" onclick="switchBatteryChartType('bar')" class="px-3 py-1 text-xs font-semibold rounded-md text-gray-400 hover:text-white transition">Bar</button>
                </div>
            </div>
            <div class="relative">
                <div id="batteryScrollWrapper" class="w-full overflow-x-auto overflow-y-hidden custom-scrollbar pb-3">
                    <div id="batteryChartContainer" class="relative h-[240px]" style="min-width: 100%;">
                        <canvas id="batteryChart"></canvas>
                    </div>
                </div>
                <canvas id="batteryChartYAxis" class="absolute top-0 left-0 pointer-events-none z-10" style="display:none;"></canvas>
                <canvas id="batteryChartYAxisRight" class="absolute top-0 right-0 pointer-events-none z-10" style="display:none;"></canvas>
            </div>
        </div>
    </div>

    <script>
        let frameChart = null;
        let batteryChart = null;
        let liveInterval = null;
        let framePointer = 0;
        let batteryPointer = 0;
        let activeFrameCache = [];
        let frameChartType = 'line';
        let batteryChartType = 'line';

        const thresholdLinePlugin = {
            id: 'jankThresholdLine',
            afterDraw: function(chart) {
                if (chart.scales.y) {
                    const yScale = chart.scales.y;
                    const yPixel = yScale.getPixelForValue(16.6);
                    const ctx = chart.ctx;
                    if(yPixel >= chart.chartArea.top && yPixel <= chart.chartArea.bottom) {
                        ctx.save(); ctx.beginPath();
                        ctx.moveTo(chart.chartArea.left, yPixel); ctx.lineTo(chart.chartArea.right, yPixel);
                        ctx.lineWidth = 2; ctx.strokeStyle = '#f43f5e'; ctx.setLineDash([6, 4]); ctx.stroke(); ctx.restore();
                    }
                }
            }
        };

        const crosshairPlugin = {
            id: 'hoverCrosshair',
            afterDraw: function(chart) {
                const active = chart.tooltip && chart.tooltip.getActiveElements ? chart.tooltip.getActiveElements() : [];
                if (!active || active.length === 0) return;
                const x = active[0].element.x;
                const ctx = chart.ctx;
                const top = chart.chartArea.top;
                const bottom = chart.chartArea.bottom;
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, top); ctx.lineTo(x, bottom);
                ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(148, 163, 184, 0.6)'; ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.restore();
            }
        };

        // Copies a vertical strip of the chart canvas onto a pinned overlay canvas,
        // so the y-axis stays fixed on screen while the chart scrolls horizontally.
        function paintAxisStrip(srcCanvas, overlay, sxDevice, wDevice, hDevice, cssW, cssH) {
            if (!overlay || wDevice <= 0 || hDevice <= 0) return;
            if (overlay.width !== wDevice) overlay.width = wDevice;
            if (overlay.height !== hDevice) overlay.height = hDevice;
            overlay.style.width = cssW + 'px';
            overlay.style.height = cssH + 'px';
            overlay.style.display = 'block';
            const octx = overlay.getContext('2d');
            octx.clearRect(0, 0, wDevice, hDevice);
            octx.fillStyle = '#1f2937'; // match card background so scrolled data is hidden
            octx.fillRect(0, 0, wDevice, hDevice);
            octx.drawImage(srcCanvas, sxDevice, 0, wDevice, hDevice, 0, 0, wDevice, hDevice);
        }

        const stickyYAxisPlugin = {
            id: 'stickyYAxis',
            afterDraw: function(chart) {
                if (!chart.chartArea) return;
                const dpr = window.devicePixelRatio || 1;
                const src = chart.canvas;
                const cssH = chart.height;
                const hDev = Math.round(cssH * dpr);
                const id = chart.canvas.id;

                const leftOverlay = document.getElementById(id + 'YAxis');
                if (leftOverlay) {
                    const leftCssW = Math.ceil(chart.chartArea.left);
                    paintAxisStrip(src, leftOverlay, 0, Math.round(leftCssW * dpr), hDev, leftCssW, cssH);
                }

                const rightOverlay = document.getElementById(id + 'YAxisRight');
                if (rightOverlay) {
                    const rightCssW = Math.ceil(chart.width - chart.chartArea.right);
                    const sxDev = Math.floor(chart.chartArea.right * dpr);
                    paintAxisStrip(src, rightOverlay, sxDev, Math.round(rightCssW * dpr), hDev, rightCssW, cssH);
                }
            }
        };

        function updateFeedback(text, isError = false) {
            const el = document.getElementById('statusFeedback');
            el.className = `text-sm mt-4 font-medium ${isError ? 'text-rose-400' : 'text-emerald-400'}`;
            el.textContent = text; el.classList.remove('hidden');
        }

        function resizeChartCanvas(chartObj, containerId) {
            if(!chartObj) return;
            const dataLength = chartObj.data.labels.length;
            const isBar = chartObj.config.type === 'bar';
            const pxPerPoint = isBar ? 50 : 12;
            const requiredWidthPx = dataLength * pxPerPoint;
            const container = document.getElementById(containerId);
            const parentWidth = container.parentElement.clientWidth;

            // Browsers cap a canvas at ~32767px per side. Chart.js multiplies the
            // CSS width by devicePixelRatio for the backing store, so on HiDPI
            // screens the real limit is 32767 / dpr. Exceeding it silently blanks
            // the line datasets (only the threshold plugin line keeps drawing).
            const dpr = window.devicePixelRatio || 1;
            const maxCssWidth = Math.floor(32000 / dpr);
            const safeWidthPx = Math.min(requiredWidthPx, maxCssWidth);

            container.style.minWidth = Math.max(parentWidth, safeWidthPx) + 'px';
        }

        // Keeps the frame chart readable: the y-axis max tracks only the most
        // recent frames, so a one-off spike inflates the scale briefly and then
        // the axis recovers once that spike scrolls out of the recent window.
        const RECENT_WINDOW = 250; // number of latest frames the y-axis reacts to
        const Y_FLOOR = 20;        // never drop below this (keeps the 16.6ms line visible)
        function rescaleFrameY(chart) {
            const ds0 = chart.data.datasets[0].data;
            const ds1 = chart.data.datasets[1].data;
            const n = ds0.length;
            if (n === 0) return;
            const start = Math.max(0, n - RECENT_WINDOW);
            let peak = 0;
            for (let i = start; i < n; i++) {
                if (ds0[i] > peak) peak = ds0[i];
                if (ds1[i] > peak) peak = ds1[i];
            }
            let target = Math.max(Y_FLOOR, peak * 1.15); // 15% headroom above the recent peak
            const step = target <= 30 ? 5 : (target <= 100 ? 10 : 25);
            target = Math.ceil(target / step) * step;
            chart.options.scales.y.min = 0;
            chart.options.scales.y.max = target;
        }

        function frameDatasetStyle(type) {
            const isLine = type === 'line';
            return [
                { label: 'UI Thread (Dart)', data: [], borderColor: '#3b82f6',
                  backgroundColor: isLine ? 'rgba(59, 130, 246, 0.05)' : 'rgba(59, 130, 246, 0.55)',
                  borderWidth: isLine ? 2 : 1, pointRadius: [], pointHoverRadius: isLine ? 4 : 0,
                  pointBackgroundColor: '#f43f5e', pointBorderColor: '#fff', pointBorderWidth: 2,
                  fill: isLine, tension: isLine ? 0.1 : 0 },
                { label: 'Raster Thread (GPU)', data: [], borderColor: '#a855f7',
                  backgroundColor: isLine ? 'rgba(168, 85, 247, 0.05)' : 'rgba(168, 85, 247, 0.55)',
                  borderWidth: isLine ? 2 : 1, pointRadius: [], pointHoverRadius: isLine ? 4 : 0,
                  pointBackgroundColor: '#f43f5e', pointBorderColor: '#fff', pointBorderWidth: 2,
                  fill: isLine, tension: isLine ? 0.1 : 0 }
            ];
        }

        function batteryDatasetStyle(type) {
            const isLine = type === 'line';
            return [
                { label: 'Battery Capacity (%)', data: [], borderColor: '#10b981',
                  backgroundColor: isLine ? 'rgba(16, 185, 129, 0.05)' : 'rgba(16, 185, 129, 0.55)',
                  borderWidth: isLine ? 2 : 1, pointRadius: 0, pointHoverRadius: isLine ? 4 : 0,
                  yAxisID: 'yLeft', tension: isLine ? 0.1 : 0 },
                { label: 'Core Temperature (°C)', data: [], borderColor: '#f97316',
                  backgroundColor: isLine ? 'rgba(249, 115, 22, 0.05)' : 'rgba(249, 115, 22, 0.55)',
                  borderWidth: isLine ? 2 : 1, pointRadius: 0, pointHoverRadius: isLine ? 4 : 0,
                  yAxisID: 'yRight', tension: isLine ? 0.1 : 0 }
            ];
        }

        function frameChartOptions() {
            return {
                responsive: true, maintainAspectRatio: false, animation: false,
                interaction: { mode: 'index', intersect: false },
                scales: { x: { grid: { color: '#374151' }, ticks: { color: '#9ca3af', maxTicksLimit: 20 } }, y: { grid: { color: '#374151' }, ticks: { color: '#9ca3af' }, suggestedMax: 20 } },
                plugins: {
                    legend: { labels: { color: '#f3f4f6' } },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `${context.dataset.label}: ${context.parsed.y} ms`;
                            },
                            footer: function(context) {
                                const idx = context[0].dataIndex;
                                const frameObj = activeFrameCache[idx];
                                if(frameObj && frameObj.triggered_event && frameObj.triggered_event !== "None") {
                                    return `⚡ OS Event: ${frameObj.triggered_event}`;
                                }
                                return null;
                            }
                        }
                    }
                }
            };
        }

        function batteryChartOptions() {
            return {
                responsive: true, maintainAspectRatio: false, animation: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: { grid: { color: '#374151' }, ticks: { color: '#9ca3af', maxTicksLimit: 20 } },
                    yLeft: { position: 'left', grid: { color: '#374151' }, ticks: { color: '#10b981' }, min: 0, max: 100 },
                    yRight: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#f97316' }, suggestedMin: 25, suggestedMax: 45 }
                },
                plugins: { legend: { labels: { color: '#f3f4f6' } } }
            };
        }

        function updateToggleButtons(chartName, activeType) {
            const lineBtn = document.getElementById(chartName + 'LineBtn');
            const barBtn = document.getElementById(chartName + 'BarBtn');
            const active = 'px-3 py-1 text-xs font-semibold rounded-md bg-emerald-600 text-white transition';
            const inactive = 'px-3 py-1 text-xs font-semibold rounded-md text-gray-400 hover:text-white transition';
            lineBtn.className = activeType === 'line' ? active : inactive;
            barBtn.className = activeType === 'bar' ? active : inactive;
        }

        function switchFrameChartType(type) {
            if (type === frameChartType) return;
            frameChartType = type;
            updateToggleButtons('frame', type);
            if (!frameChart) return;

            const labels = [...frameChart.data.labels];
            const uiData = [...frameChart.data.datasets[0].data];
            const rasterData = [...frameChart.data.datasets[1].data];
            const uiPointRadius = frameChart.data.datasets[0].pointRadius ? [...frameChart.data.datasets[0].pointRadius] : [];
            const rasterPointRadius = frameChart.data.datasets[1].pointRadius ? [...frameChart.data.datasets[1].pointRadius] : [];

            frameChart.destroy();
            const ctx = document.getElementById('telemetryChart').getContext('2d');
            const ds = frameDatasetStyle(type);
            ds[0].data = uiData; ds[0].pointRadius = uiPointRadius;
            ds[1].data = rasterData; ds[1].pointRadius = rasterPointRadius;

            frameChart = new Chart(ctx, {
                type: type, plugins: [thresholdLinePlugin, crosshairPlugin, stickyYAxisPlugin],
                data: { labels: labels, datasets: ds },
                options: frameChartOptions()
            });
            rescaleFrameY(frameChart);
            resizeChartCanvas(frameChart, 'frameChartContainer');
            frameChart.update();
        }

        function switchBatteryChartType(type) {
            if (type === batteryChartType) return;
            batteryChartType = type;
            updateToggleButtons('battery', type);
            if (!batteryChart) return;

            const labels = [...batteryChart.data.labels];
            const battData = [...batteryChart.data.datasets[0].data];
            const tempData = [...batteryChart.data.datasets[1].data];

            batteryChart.destroy();
            const ctx = document.getElementById('batteryChart').getContext('2d');
            const ds = batteryDatasetStyle(type);
            ds[0].data = battData;
            ds[1].data = tempData;

            batteryChart = new Chart(ctx, {
                type: type, plugins: [stickyYAxisPlugin],
                data: { labels: labels, datasets: ds },
                options: batteryChartOptions()
            });
            resizeChartCanvas(batteryChart, 'batteryChartContainer');
            batteryChart.update();
        }

        function initializeCharts() {
            if (frameChart) { frameChart.destroy(); }
            if (batteryChart) { batteryChart.destroy(); }
            framePointer = 0; batteryPointer = 0; activeFrameCache = [];

            const ctxFrame = document.getElementById('telemetryChart').getContext('2d');
            frameChart = new Chart(ctxFrame, {
                type: frameChartType, plugins: [thresholdLinePlugin, crosshairPlugin, stickyYAxisPlugin],
                data: { labels: [], datasets: frameDatasetStyle(frameChartType) },
                options: frameChartOptions()
            });

            const ctxBattery = document.getElementById('batteryChart').getContext('2d');
            batteryChart = new Chart(ctxBattery, {
                type: batteryChartType, plugins: [stickyYAxisPlugin],
                data: { labels: [], datasets: batteryDatasetStyle(batteryChartType) },
                options: batteryChartOptions()
            });
        }

        async function triggerStart() {
            const pkg = document.getElementById('packageName').value;
            const apk = document.getElementById('apkFile').files[0];
            if(!pkg || !apk) { alert("Complete configurations first."); return; }

            updateFeedback("[*] Compiling hardware links, installing package artifact instance...");
            document.getElementById('startBtn').disabled = true;
            document.getElementById('metricsMatrix').classList.add('opacity-40');
            
            initializeCharts();

            const formData = new FormData();
            formData.append('package_name', pkg); formData.append('apk', apk);

            try {
                const res = await fetch('/api/start', { method: 'POST', body: formData });
                const data = await res.json();
                if(data.success) {
                    updateFeedback("[+] PIPELINE SECURED! Play the game now and watch events trace into your dashboard...", false);
                    document.getElementById('stopBtn').disabled = false;
                    liveInterval = setInterval(pollLiveTelemetry, 400);
                } else {
                    alert(`Fault: ${data.error}`); document.getElementById('startBtn').disabled = false;
                }
            } catch (err) { alert("Connection fault."); document.getElementById('startBtn').disabled = false; }
        }

        async function pollLiveTelemetry() {
            try {
                const res = await fetch(`/api/live?frame_start=${framePointer}&battery_start=${batteryPointer}`);
                const data = await res.json();

                if (data.new_frames && data.new_frames.length > 0) {
                    data.new_frames.forEach(f => {
                        frameChart.data.labels.push(`F-${f.frame_id}`);
                        frameChart.data.datasets[0].data.push(f.ui_time_ms);
                        frameChart.data.datasets[1].data.push(f.raster_time_ms);
                        
                        const hasEvent = f.triggered_event && f.triggered_event !== "None";
                        const dotSize = hasEvent ? 7 : 0;
                        frameChart.data.datasets[0].pointRadius.push(dotSize);
                        frameChart.data.datasets[1].pointRadius.push(dotSize);
                        
                        activeFrameCache.push(f);
                    });
                    framePointer += data.new_frames.length;
                    
                    if (frameChart.data.labels.length > 2000) {
                        frameChart.data.labels.shift(); 
                        frameChart.data.datasets[0].data.shift(); 
                        frameChart.data.datasets[1].data.shift();
                        frameChart.data.datasets[0].pointRadius.shift();
                        frameChart.data.datasets[1].pointRadius.shift();
                        activeFrameCache.shift();
                    }
                    
                    resizeChartCanvas(frameChart, 'frameChartContainer');
                    rescaleFrameY(frameChart);
                    frameChart.update();
                    
                    const fw = document.getElementById('frameScrollWrapper');
                    fw.scrollLeft = fw.scrollWidth;
                }

                if (data.new_battery && data.new_battery.length > 0) {
                    data.new_battery.forEach(b => {
                        batteryChart.data.labels.push(`${b.time_sec}s`);
                        batteryChart.data.datasets[0].data.push(b.battery_level);
                        batteryChart.data.datasets[1].data.push(b.temperature_c);
                    });
                    batteryPointer += data.new_battery.length;
                    
                    resizeChartCanvas(batteryChart, 'batteryChartContainer');
                    batteryChart.update();
                    
                    const bw = document.getElementById('batteryScrollWrapper');
                    bw.scrollLeft = bw.scrollWidth;
                }
            } catch (err) { console.error("Polling fault:", err); }
        }

        async function triggerStop() {
            clearInterval(liveInterval);
            updateFeedback("[*] Finalizing structural reports calculations...");
            document.getElementById('stopBtn').disabled = true;

            try {
                const res = await fetch('/api/stop', { method: 'POST' });
                const data = await res.json();
                if(data.success) {
                    updateFeedback("[+] Run analysis completed cleanly!");
                    document.getElementById('metricsMatrix').classList.remove('opacity-40');
                    document.getElementById('exportBtn').disabled = false;
                    document.getElementById('exportBtn').classList.remove('cursor-not-allowed');
                    
                    // UNLOCK THE NEW MD BUTTON
                    document.getElementById('exportMdBtn').disabled = false;
                    document.getElementById('exportMdBtn').classList.remove('cursor-not-allowed');

                    const r = data.report;
                    document.getElementById('health-score').textContent = `${r.summary.health_score}/100`;
                    document.getElementById('jank-percentage').textContent = `${r.summary.jank_percentage}%`;
                    document.getElementById('avg-ui').textContent = `${r.summary.average_ui_time_ms}ms`;
                    document.getElementById('avg-raster').textContent = `${r.summary.average_raster_time_ms}ms`;

                    renderFinalCharts(r.frames, r.battery);
                }
            } catch (err) { alert("Processing timeout."); } finally { document.getElementById('startBtn').disabled = false; }
        }

        function renderFinalCharts(frames, battery) {
            if(frameChart) frameChart.destroy();
            if(batteryChart) batteryChart.destroy();
            
            activeFrameCache = frames;

            const ctxF = document.getElementById('telemetryChart').getContext('2d');
            const fds = frameDatasetStyle(frameChartType);
            const eventDots = frames.map(f => (f.triggered_event && f.triggered_event !== "None") ? 7 : 0);
            fds[0].data = frames.map(f => f.ui_time_ms); fds[0].pointRadius = eventDots;
            fds[1].data = frames.map(f => f.raster_time_ms); fds[1].pointRadius = [...eventDots];

            const fOpts = frameChartOptions();
            fOpts.scales.x.ticks.maxTicksLimit = 30;

            frameChart = new Chart(ctxF, {
                type: frameChartType, plugins: [thresholdLinePlugin, crosshairPlugin, stickyYAxisPlugin],
                data: { labels: frames.map(f => `F-${f.frame_id}`), datasets: fds },
                options: fOpts
            });
            resizeChartCanvas(frameChart, 'frameChartContainer');

            const ctxB = document.getElementById('batteryChart').getContext('2d');
            const bds = batteryDatasetStyle(batteryChartType);
            bds[0].data = battery.map(b => b.battery_level);
            bds[1].data = battery.map(b => b.temperature_c);

            const bOpts = batteryChartOptions();
            bOpts.scales.x.ticks.maxTicksLimit = 30;

            batteryChart = new Chart(ctxB, {
                type: batteryChartType, plugins: [stickyYAxisPlugin],
                data: { labels: battery.map(b => `${b.time_sec}s`), datasets: bds },
                options: bOpts
            });
            resizeChartCanvas(batteryChart, 'batteryChartContainer');
        }

        function triggerExcelDownload() { window.location.href = '/api/export/excel'; }
        
        // NEW EXPORT MD FUNCTION
        function triggerMdDownload() { window.location.href = '/api/export/md'; }
    </script>
</body>
</html>
